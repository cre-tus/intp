services:
  mysql:
    image: mysql:8.0
    container_name: infp-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 30
    # 운영에서는 보통 DB 포트 외부 공개 안 함
    # 필요하면 주석 해제:
    # ports:
    #   - "3307:3306"

  redis:
    image: redis:7
    container_name: infp-redis
    restart: unless-stopped
    # 운영에서는 보통 Redis 포트 외부 공개 안 함
    # 필요하면 주석 해제:
    # ports:
    #   - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infp-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TZ: Asia/Seoul
    expose:
      - "8080"
    # 운영에서는 nginx만 외부에 열고, backend 포트는 안 열어도 됨
    # 디버깅 필요하면 주석 해제:
    # ports:
    #   - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: infp-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: Asia/Seoul
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: infp-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
