services:
  mysql:
    image: mysql:8.0
    container_name: infp-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/create.sql:/docker-entrypoint-initdb.d/create.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 30
    ports:
      - "127.0.0.1:3308:3306"
  redis:
    image: redis:7
    container_name: infp-redis
    restart: unless-stopped

  gtfs-postgis:
    image: postgis/postgis:16-3.4
    container_name: infp-gtfs-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${GTFS_POSTGRES_DB:-gtfs}
      POSTGRES_USER: ${GTFS_POSTGRES_USER:-gtfs}
      POSTGRES_PASSWORD: ${GTFS_POSTGRES_PASSWORD:-gtfs}
      TZ: Asia/Seoul
    volumes:
      - gtfs_postgis_data:/var/lib/postgresql/data
      - ./db/postgis_create.sql:/docker-entrypoint-initdb.d/01_postgis_create.sql:ro
      - ./db/postgis_insert.sql:/docker-entrypoint-initdb.d/02_postgis_insert.sql:ro
      - ./db/gtfs/tokyo_rail:/gtfs/tokyo_rail:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 30
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infp-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      gtfs-postgis:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GTFS_DB_HOST: gtfs-postgis
      GTFS_DB_PORT: 5432
      GTFS_DB_NAME: ${GTFS_POSTGRES_DB:-gtfs}
      GTFS_DB_USER: ${GTFS_POSTGRES_USER:-gtfs}
      GTFS_DB_PASSWORD: ${GTFS_POSTGRES_PASSWORD:-gtfs}
      GOOGLE_MAP_API: ${GOOGLE_MAP_API:-}
      GOOGLE_PRIVATE_API: ${GOOGLE_PRIVATE_API:-}
      TZ: Asia/Seoul
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: infp-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      TZ: Asia/Seoul
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev -- --webpack

  nginx:
    image: nginx:alpine
    container_name: infp-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - tileserver
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro

  certbot:
    image: certbot/certbot
    container_name: infp-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

  tileserver:
    image: maptiler/tileserver-gl:latest
    container_name: infp-tileserver
    restart: unless-stopped
    volumes:
      - ./tiles:/data
    command: ["--port", "8080"]

  nominatim:
    image: mediagis/nominatim:4.4
    container_name: nominatim
    restart: unless-stopped
    environment:
      PBF_PATH: /data/kanto-260209.osm.pbf
      THREADS: 16
      NOMINATIM_PASSWORD: ${NOMINATIM_PASSWORD}
    volumes:
      - ./nominatim/pbf:/data
      - nominatim_data:/var/lib/postgresql/14/main
    shm_size: 4gb

volumes:
  mysql_data:
  gtfs_postgis_data:
  nominatim_data:
